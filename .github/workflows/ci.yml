name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs needs tags to derive the version
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # --all-extras so mypy can type-check tui.py (subclasses textual) and the
      # GitPython backend against the real packages, not missing-import stubs.
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest

  # The base matrix runs without extras, so the GitPython parity tests skip
  # there. This job installs the [git] extra so that backend is exercised.
  test-gitpython:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra git
      - run: uv run --extra git pytest

  # The base matrix runs without extras, so the Textual TUI (Pilot) tests skip
  # there. This job installs the [tui] extra so the TUI is exercised.
  test-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra tui
      - run: uv run --extra tui pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group docs
      - run: uv run --group docs mkdocs build --strict
